  <text x="450" y="62" fill="#9aa0ac" font-size="12" text-anchor="middle">plain Opus vs Opus + current Mythos overlay · blind Sonnet judge · position-swapped · K=3</text>

  <rect x="92" y="82" width="14" height="14" rx="3" fill="#8893a6"/>
  <text x="114" y="94" fill="#c7cad1" font-size="12">Plain Opus wins</text>
