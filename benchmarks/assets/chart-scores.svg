<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Helvetica,Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Hardest-six benchmark pairwise wins per task</title>
  <desc id="desc">In eighteen K equals three comparisons, plain Opus won two, Opus with Mythos won five, and eleven tied. Mythos had no regression tasks and directional net plus three.</desc>
  <rect width="900" height="500" rx="14" fill="#14151a"/>
