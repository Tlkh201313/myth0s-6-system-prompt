  <text x="74" y="468" fill="#c7cad1" font-size="12">18 comparisons · base wins 2 · Mythos wins 5 · ties 11</text>
  <text x="826" y="468" fill="#b9a3ff" font-size="15" font-weight="700" text-anchor="end">net +3 · regression tasks 0</text>
