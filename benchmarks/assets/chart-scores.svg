  <text x="260" y="94" fill="#c7cad1" font-size="12">Mythos wins</text>
  <rect x="372" y="82" width="14" height="14" rx="3" fill="#566074"/>
  <text x="394" y="94" fill="#c7cad1" font-size="12">ties shown below</text>

