  <text x="62" y="214" fill="#9aa0ac" font-size="11" text-anchor="end">2</text>
  <text x="62" y="124" fill="#9aa0ac" font-size="11" text-anchor="end">3</text>

  <rect x="98" y="388" width="32" height="2" rx="2" fill="#8893a6"/>
